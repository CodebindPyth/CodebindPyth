<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');

      .cursor { animation: blink 1.1s step-end infinite; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

      .pulse { animation: pulse 1.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:1;r:4} 50%{opacity:0.3;r:2.5} }

      .whoami { animation: typein 0.4s ease forwards; }
      .arrow-text { animation: typein2 1.8s ease forwards; opacity:0; }
      @keyframes typein { from{opacity:0} to{opacity:1} }
      @keyframes typein2 { 0%{opacity:0} 40%{opacity:0} 100%{opacity:1} }

      .tag1 { animation: fadein 0.5s 0.2s ease forwards; opacity:0; }
      .tag2 { animation: fadein 0.5s 0.5s ease forwards; opacity:0; }
      .tag3 { animation: fadein 0.5s 0.8s ease forwards; opacity:0; }
      .tag4 { animation: fadein 0.5s 1.1s ease forwards; opacity:0; }
      .tag5 { animation: fadein 0.5s 1.4s ease forwards; opacity:0; }
      @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    </style>

    <!-- Grid pattern -->
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#58a6ff" stroke-width="0.3" opacity="0.15"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Scanline -->
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="#00ff88" opacity="0.012"/>
    </pattern>

    <radialGradient id="orb1" cx="80%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="15%" cy="100%" r="35%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="#0d1117"/>
  <rect width="800" height="220" rx="12" fill="url(#grid)"/>
  <rect width="800" height="220" rx="12" fill="url(#orb1)"/>
  <rect width="800" height="220" rx="12" fill="url(#orb2)"/>
  <rect width="800" height="220" rx="12" fill="url(#scan)"/>
  <!-- Border -->
  <rect width="800" height="220" rx="12" fill="none" stroke="#21262d" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="36" cy="26" r="5" fill="#ff5f57"/>
  <circle cx="54" cy="26" r="5" fill="#febc2e"/>
  <circle cx="72" cy="26" r="5" fill="#28c840"/>

  <!-- Top label -->
  <text x="760" y="30" font-family="'Fira Code',monospace" font-size="11" fill="#30363d" text-anchor="end">~/Codebindpyth/README.md</text>

  <!-- $ whoami -->
  <text class="whoami" x="36" y="68" font-family="'Fira Code',monospace" font-size="13" fill="#00ff88" font-weight="700">$</text>
  <text class="whoami" x="52" y="68" font-family="'Fira Code',monospace" font-size="13" fill="#58a6ff">whoami</text>

  <!-- → Codebindpyth -->
  <text class="arrow-text" x="36" y="88" font-family="'Fira Code',monospace" font-size="12" fill="#3fb950">→ Codebindpyth</text>

  <!-- Main name: // Codebindpyth -->
  <text x="36" y="130" font-family="'Fira Code',monospace" font-size="36" font-weight="700">
    <tspan fill="#30363d">// </tspan><tspan fill="#58a6ff" filter="url(#glow)">Codebindpyth</tspan><tspan fill="#e6edf3"> 🛠</tspan>
  </text>

  <!-- Cursor -->
  <rect class="cursor" x="560" y="101" width="3" height="34" fill="#58a6ff"/>

  <!-- Tags -->
  <!-- Python -->
  <g class="tag1">
    <rect x="36" y="148" width="66" height="22" rx="4" fill="rgba(31,64,104,0.35)" stroke="#1f4068" stroke-width="1"/>
    <text x="69" y="163" font-family="'Fira Code',monospace" font-size="11" fill="#58a6ff" text-anchor="middle" font-weight="700">Python</text>
  </g>
  <!-- Bug Hunter -->
  <g class="tag2">
    <rect x="110" y="148" width="90" height="22" rx="4" fill="rgba(90,30,30,0.35)" stroke="#5a1e1e" stroke-width="1"/>
    <text x="155" y="163" font-family="'Fira Code',monospace" font-size="11" fill="#f85149" text-anchor="middle" font-weight="700">Bug Hunter</text>
  </g>
  <!-- Automation -->
  <g class="tag3">
    <rect x="208" y="148" width="95" height="22" rx="4" fill="rgba(26,64,40,0.35)" stroke="#1a4028" stroke-width="1"/>
    <text x="255" y="163" font-family="'Fira Code',monospace" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="700">Automation</text>
  </g>
  <!-- C Security -->
  <g class="tag4">
    <rect x="311" y="148" width="92" height="22" rx="4" fill="rgba(107,78,10,0.35)" stroke="#6b4e0a" stroke-width="1"/>
    <text x="357" y="163" font-family="'Fira Code',monospace" font-size="11" fill="#e3b341" text-anchor="middle" font-weight="700">C Security</text>
  </g>
  <!-- Programming -->
  <g class="tag5">
    <rect x="411" y="148" width="110" height="22" rx="4" fill="rgba(61,32,100,0.35)" stroke="#3d2064" stroke-width="1"/>
    <text x="466" y="163" font-family="'Fira Code',monospace" font-size="11" fill="#bc8cff" text-anchor="middle" font-weight="700">Programming</text>
  </g>

  <!-- Divider -->
  <line x1="36" y1="182" x2="764" y2="182" stroke="#21262d" stroke-width="1"/>

  <!-- Stats -->
  <text x="36" y="202" font-family="'Fira Code',monospace" font-size="12" fill="#e6edf3" font-weight="700">∞</text>
  <text x="50" y="202" font-family="'Fira Code',monospace" font-size="12" fill="#8b949e"> commits</text>
  <text x="160" y="202" font-family="'Fira Code',monospace" font-size="12" fill="#e6edf3" font-weight="700">0</text>
  <text x="172" y="202" font-family="'Fira Code',monospace" font-size="12" fill="#8b949e"> bugs escaped</text>

  <!-- Live badge -->
  <rect x="600" y="190" width="164" height="22" rx="6" fill="rgba(248,81,73,0.1)" stroke="rgba(248,81,73,0.3)" stroke-width="1"/>
  <circle class="pulse" cx="616" cy="201" r="4" fill="#f85149"/>
  <text x="628" y="206" font-family="'Fira Code',monospace" font-size="11" fill="#f85149" font-weight="700">LIVE — bug hunting</text>
</svg>
